name: Backend Smoke Tests

on:
  push:
    paths:
      - ".github/workflows/preferred-topics-tests.yml"
      - ".env.example"
      - "alembic.ini"
      - "alembic/**"
      - "app.py"
      - "core/**"
      - "service/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/preferred-topics-tests.yml"
      - ".env.example"
      - "alembic.ini"
      - "alembic/**"
      - "app.py"
      - "core/**"
      - "service/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  backend-smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install test dependencies
        run: uv sync --locked

      - name: Compile backend sources
        run: uv run python -m compileall app.py core service src tests

      - name: Run backend smoke test suite
        run: |
          uv run python -m unittest \
            tests.test_preferred_topics \
            tests.test_password_utils \
            tests.test_file_utils \
            tests.test_long_term_memory \
            tests.test_api_smoke
